<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
  <title>SmartSwap</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f7fa;
      margin: 0;
      text-align: center;
    }

    .logo {
  width: 150px;
  margin-bottom: 20px;
  animation: float 2s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0px); }
}
    .app-name {
      font-size: 28px;
      font-weight: bold;
      color: #2c3e50;
    }

    .btn-start {
      margin-top: 20px;
      padding: 10px 25px;
      font-size: 18px;
      border-radius: 25px;
    }
    
  </style>
</head>

<body>
  

  <div>
    <!-- 🔥 YOUR LOGO -->
    <img src="icon.jpg" class="logo">

    <!-- 🔥 APP NAME -->
    <div class="app-name">SmartSwap</div>

    <!-- 🔥 BUTTON -->
    <button class="btn btn-success btn-start" onclick="goLogin()">
      Get Started 🚀
    </button>
  </div>

<script>
function goLogin() {
  window.location.href = "login.html";
}
</script>

</body>
</html>

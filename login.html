<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
  <title>Login - SmartSwap</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #25D366, #128C7E);
      font-family: 'Segoe UI', sans-serif;
    }

    .login-card {
      width: 350px;
      padding: 30px;
      border-radius: 20px;
      background: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: fadeIn 0.8s ease;
    }

    .logo {
      width: 80px;
      display: block;
      margin: 0 auto 10px;
    }

    .title {
      text-align: center;
      font-weight: bold;
      margin-bottom: 20px;
      color: #333;
    }

    .btn-success {
      background: #25D366;
      border: none;
    }

    .btn-success:hover {
      background: #1da851;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<div class="login-card">

  <!-- LOGO -->
  <img src="icon.jpg" class="logo">

  <h4 class="title">SmartSwap 🔄</h4>

  <input id="email" class="form-control mb-2" placeholder="Enter Email">
  <input id="password" type="password" class="form-control mb-3" placeholder="Enter Password">

  <p style="text-align:right; margin-top:5px;">
  <a href="#" onclick="forgotPassword()" style="font-size:14px; color:#007bff;">
    Forgot Password?
  </a>
</p>
  <button class="btn btn-success w-100 mb-2" onclick="login()">Login</button>
  <button class="btn btn-outline-secondary w-100" onclick="signup()">Create Account</button>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDY-2fpS9LqM8f92TOuHPpJO4FJuDOcp4U",
  authDomain: "smartswap-5176e.firebaseapp.com",
  projectId: "smartswap-5176e",
  storageBucket: "smartswap-5176e.firebasestorage.app",
  messagingSenderId: "584861621977",
  appId: "1:584861621977:web:44e6d5a404d2f3c26a28c8"
};

firebase.initializeApp(firebaseConfig);

// SIGNUP
function signup() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    alert("Please fill all fields ⚠️");
    return;
  }

  firebase.auth().createUserWithEmailAndPassword(email, password)
    .then(() => {
      alert("Signup Successful ✅");
    })
    .catch(error => {
      alert(error.message);
    });
}

// LOGIN
function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    alert("Please fill all fields ⚠️");
    return;
  }

  firebase.auth().signInWithEmailAndPassword(email, password)
    .then(() => {
      alert("Login Successful 🎉");
      window.location.href = "dashboard.html";
    })
    .catch(error => {
      alert(error.message);
    });
}
function forgotPassword() {
  const email = prompt("Enter your registered email:");

  if (!email) {
    alert("Please enter email");
    return;
  }

  firebase.auth().sendPasswordResetEmail(email)
    .then(() => {
      alert("Password reset link sent to your email ✅");
    })
    .catch((error) => {
      alert(error.message);
    });
}
</script>

</body>
</html>

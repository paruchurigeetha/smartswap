<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
  <title>My Items</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f5f7fa;
    }

    .card {
      border-radius: 15px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .item-img {
      height: 180px;
      object-fit: cover;
      border-radius: 15px 15px 0 0;
    }

    .delete-btn {
      border-radius: 10px;
      font-weight: 500;
    }

    .header-box {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    @media (max-width: 768px) {
      .item-img {
        height: 150px;
      }
    }
  </style>
</head>

<body class="container mt-4">

<!-- HEADER -->
<div class="header-box mb-3">
  <h3>My Posted Items 📦</h3>
  <h6 id="itemCount" class="text-muted"></h6>
</div>

<!-- ITEMS -->
<div id="myItemsContainer" class="row"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDY-2fpS9LqM8f92TOuHPpJO4FJuDOcp4U",
  authDomain: "smartswap-5176e.firebaseapp.com",
  projectId: "smartswap-5176e"
};

firebase.initializeApp(firebaseConfig);

let currentUser;

firebase.auth().onAuthStateChanged(user => {
  if (user) {
    currentUser = user.email;
    loadMyItems();
  }
});

function loadMyItems() {
  const container = document.getElementById("myItemsContainer");
  const countBox = document.getElementById("itemCount");

  firebase.firestore().collection("items")
    .where("owner", "==", currentUser)
    .onSnapshot(snapshot => {

      container.innerHTML = "";
      let count = 0;

      snapshot.forEach(doc => {
        const item = doc.data();
        count++;

        container.innerHTML += `
        <div class="col-lg-4 col-md-6 col-sm-12 mb-4">
          <div class="card shadow-sm border-0">

            <img src="${item.image}"
              onerror="this.src='https://via.placeholder.com/300?text=No+Image';"
              class="item-img">

            <div class="card-body">

              <h5 class="fw-bold">${item.name}</h5>

              <p class="text-danger mb-1">
                <del>₹${item.mrp}</del>
              </p>

              <h5 class="text-success fw-bold mb-3">₹${item.price}</h5>

              <button class="btn btn-danger w-100 delete-btn"
                onclick='deleteItem("${doc.id}")'>
                🗑 Delete
              </button>

            </div>
          </div>
        </div>
        `;
      });

      // ✅ COUNT DISPLAY
      countBox.innerText = count + " items";

      // ✅ EMPTY STATE
      if (count === 0) {
        container.innerHTML = `
          <div class="text-center mt-5">
            <h5>No items posted yet 😔</h5>
            <p class="text-muted">Start selling your items 🛒</p>
          </div>
        `;
        countBox.innerText = "0 items";
      }

    });
}

// DELETE FUNCTION
function deleteItem(id) {
  if (confirm("Delete this item?")) {
    firebase.firestore().collection("items").doc(id).delete();
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
  <title>Notifications</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h3>🔔 Notifications</h3>

<div id="notiBox"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDY-2fpS9LqM8f92TOuHPpJO4FJuDOcp4U",
  authDomain: "smartswap-5176e.firebaseapp.com",
  projectId: "smartswap-5176e"
};

firebase.initializeApp(firebaseConfig);

let currentUser;

firebase.auth().onAuthStateChanged(user => {
  if (user) {
    currentUser = user.email;
    loadNotifications();
  }
});

// LOAD NOTIFICATIONS
function loadNotifications() {
  const box = document.getElementById("notiBox");

  firebase.firestore().collection("notifications")
    .orderBy("time", "desc")
    .onSnapshot(snapshot => {

      box.innerHTML = "";

      let grouped = {};

      snapshot.forEach(doc => {
        const n = doc.data();

        if (n.to !== currentUser) return;

        // 🔥 create unique key
        const key = n.from + "_" + n.itemId;

        if (!grouped[key]) {
          grouped[key] = {
            from: n.from,
            itemId: n.itemId,
            itemName: n.itemName,
            count: 0,
            lastMessage: ""
          };
        }

        if (!n.seen) {
  grouped[key].count++;
}
        grouped[key].lastMessage = n.message;
      });

      // 🔥 show grouped notifications
      Object.values(grouped).forEach(n => {
        box.innerHTML += `
          <div class="card p-3 mb-2 shadow" style="cursor:pointer"
            onclick='openChat("${n.itemId}", "${n.from}", "${n.itemName}")'>

            <b>${n.from}</b> (${n.count} messages)
            <p><b>${n.itemName}</b></p>
            <p>${n.lastMessage}</p>

          </div>
        `;
      });

    });
}
// OPEN CHAT
function openChat(itemId, user, itemName) {
  localStorage.setItem("chatItemId", itemId);
  localStorage.setItem("chatUser", user);
  localStorage.setItem("chatItem", JSON.stringify({
    name: itemName
  }));

  // ✅ WAIT FOR UPDATE
  firebase.firestore().collection("notifications")
    .where("to", "==", currentUser)
    .where("itemId", "==", itemId)
    .where("from", "==", user)
    .get()
    .then(snapshot => {

      const promises = [];

      snapshot.forEach(doc => {
        promises.push(doc.ref.update({ seen: true }));
      });

      // 🔥 WAIT FOR ALL UPDATES
      return Promise.all(promises);
    })
    .then(() => {
      // ✅ NAVIGATE AFTER UPDATE
      window.location.href = "chat.html";
    });
}
</script>

</body>
</html>

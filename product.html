<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
  <title>Product Details</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h3>Product Details 🛍</h3>

<div id="productBox" class="card p-4 shadow"></div>

<script>
const item = JSON.parse(localStorage.getItem("selectedItem"));

const box = document.getElementById("productBox");

box.innerHTML = `
  <img src="${item.image}" style="width:100%;height:300px;object-fit:cover;border-radius:10px;">
  
  <h4 class="mt-3">${item.name}</h4>

  <p class="text-danger"><del>₹${item.mrp}</del></p>
  <h3 class="text-success">₹${item.price}</h3>

  <p class="text-muted">📍 ${item.college}</p>

  <button class="btn btn-primary w-100 mb-2"
    onclick="startChat('${item.id}')">
    🛒 Buy / Chat
  </button>

  <button class="btn btn-outline-danger w-100"
    onclick="addToWishlist()">
    ❤️ Add to Wishlist
  </button>
`;

function startChat(id) {
  localStorage.setItem("chatItemId", id);
  localStorage.setItem("chatItem", JSON.stringify(item));
  localStorage.setItem("chatUser", item.owner);

  window.location.href = "chat.html";
}

function addToWishlist() {
  let w = JSON.parse(localStorage.getItem("wishlist")) || [];
  w.push(item);
  localStorage.setItem("wishlist", JSON.stringify(w));
  alert("Added to wishlist ❤️");
}
</script>

</body>
</html>

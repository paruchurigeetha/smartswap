<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
  <title>My Wishlist</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f5f7fa;
    }

    .card {
      border-radius: 15px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }
  </style>
</head>

<body class="container mt-4">

<h3 class="mb-4">My Wishlist ❤️</h3>

<div id="wishlistContainer" class="row"></div>

<script>
let items = JSON.parse(localStorage.getItem("wishlist")) || [];

const container = document.getElementById("wishlistContainer");

// LOAD ITEMS
function loadWishlist() {
  container.innerHTML = "";

  items.forEach((item, index) => {

    container.innerHTML += `
    <div class="col-md-4 mb-4">
      <div class="card shadow-sm p-3">

        <img src="${item.image}" style="height:180px;object-fit:cover;border-radius:10px;">

        <h5 class="mt-2">${item.name}</h5>

        <p class="text-danger"><del>₹${item.mrp}</del></p>
        <h5 class="text-success">₹${item.price}</h5>

        <p class="text-muted">📍 ${item.college}</p>

        <button class="btn btn-primary w-100 mb-2"
          onclick="buyItem(${index})">
          🛒 Buy / Chat
        </button>

        <button class="btn btn-danger w-100"
          onclick="removeItem(${index})">
          ❌ Remove
        </button>

      </div>
    </div>
    `;
  });

  // EMPTY STATE
  if (items.length === 0) {
    container.innerHTML = `
      <div class="text-center mt-5">
        <h5>No items in wishlist 😔</h5>
        <p class="text-muted">Start adding items ❤️</p>
      </div>
    `;
  }
}

// REMOVE ITEM
function removeItem(index) {
  items.splice(index, 1);
  localStorage.setItem("wishlist", JSON.stringify(items));
  loadWishlist();
}

// BUY ITEM
function buyItem(index) {
  const item = items[index];

  localStorage.setItem("chatItemId", item.id);
  localStorage.setItem("chatItem", JSON.stringify(item));
  localStorage.setItem("chatUser", item.owner);

  window.location.href = "chat.html";
}

loadWishlist();
</script>

</body>
</html>
